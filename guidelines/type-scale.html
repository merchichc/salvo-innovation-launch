<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Display → caption ramp with token names." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px 24px; background:var(--paper); color:var(--ink-900); }
  .row { display:flex; align-items:baseline; gap:14px; border-bottom:1px solid var(--sand-200); padding:7px 0; }
  .row span.label { font-family:var(--font-mono); font-size:10px; letter-spacing:0.08em; color:var(--text-muted); white-space:nowrap; width:130px; }
  .s { font-family:var(--font-display); font-weight:700; letter-spacing:-0.02em; line-height:1; }
</style></head>
<body>
  <div class="row"><span class="s" style="font-size:44px">Display lg</span><span class="label">--text-display-lg · 700</span></div>
  <div class="row"><span class="s" style="font-size:36px">Heading 1</span><span class="label">--text-h1 · 36/700</span></div>
  <div class="row"><span class="s" style="font-size:28px">Heading 2</span><span class="label">--text-h2 · 28/700</span></div>
  <div class="row"><span class="s" style="font-size:22px">Heading 3</span><span class="label">--text-h3 · 22/700</span></div>
  <div class="row"><span class="s" style="font-size:19px; font-family:var(--font-body); font-weight:400">Body large</span><span class="label">--text-body-lg · 19/400</span></div>
  <div class="row"><span class="s" style="font-size:17px; font-family:var(--font-body); font-weight:400">Body</span><span class="label">--text-body · 17/400</span></div>
  <div class="row"><span class="s" style="font-size:13px; font-family:var(--font-mono); font-weight:700; letter-spacing:0.14em">CAPTION / EYEBROW</span><span class="label">--text-caption · 13</span></div>
</body></html>
