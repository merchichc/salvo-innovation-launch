<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — status" subtitle="Success, warning, danger, info — solid + soft tint." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--paper); font-family:var(--font-mono); }
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .pair { display:flex; gap:6px; }
  .sw { border-radius:var(--radius-md); border:2px solid var(--ink-900); height:72px; flex:1; }
  .meta { margin-top:8px; font-size:11px; line-height:1.3; }
  .meta b { display:block; font-weight:700; text-transform:capitalize; }
  .hex { color:var(--text-muted); text-transform:uppercase; }
</style></head>
<body>
<div class="row">
  <div><div class="pair"><div class="sw" style="background:var(--success-500)"></div><div class="sw" style="background:var(--success-100)"></div></div><div class="meta"><b>success</b><span class="hex">#1fa971</span></div></div>
  <div><div class="pair"><div class="sw" style="background:var(--warning-500)"></div><div class="sw" style="background:var(--warning-100)"></div></div><div class="meta"><b>warning</b><span class="hex">#f5a524</span></div></div>
  <div><div class="pair"><div class="sw" style="background:var(--danger-500)"></div><div class="sw" style="background:var(--danger-100)"></div></div><div class="meta"><b>danger</b><span class="hex">#d7263d</span></div></div>
  <div><div class="pair"><div class="sw" style="background:var(--info-500)"></div><div class="sw" style="background:var(--info-100)"></div></div><div class="meta"><b>info</b><span class="hex">#2d6be4</span></div></div>
</div>
</body></html>
