<!-- @dsCard group="Colors" viewport="700x150" name="Signal — primary" subtitle="The burst of fire. CTAs, links, key accents." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--paper); font-family:var(--font-mono); }
  .row { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; }
  .sw { border-radius:var(--radius-md); border:2px solid var(--ink-900); height:78px; display:flex; align-items:flex-end; padding:8px; }
  .meta { margin-top:8px; font-size:11px; letter-spacing:0.02em; line-height:1.3; }
  .meta b { display:block; font-weight:700; }
  .hex { color:var(--text-muted); text-transform:uppercase; }
  .star { font-size:10px; color:var(--signal-600); font-weight:700; }
</style></head>
<body>
<div class="row">
  <div><div class="sw" style="background:var(--signal-100)"></div><div class="meta"><b>100</b><span class="hex">#ffe2d6</span></div></div>
  <div><div class="sw" style="background:var(--signal-200)"></div><div class="meta"><b>200</b><span class="hex">#ffc3aa</span></div></div>
  <div><div class="sw" style="background:var(--signal-300)"></div><div class="meta"><b>300</b><span class="hex">#ff9166</span></div></div>
  <div><div class="sw" style="background:var(--signal-400)"></div><div class="meta"><b>400</b><span class="hex">#ff6a3d</span></div></div>
  <div><div class="sw" style="background:var(--signal-500)"></div><div class="meta"><b>500 <span class="star">PRIMARY</span></b><span class="hex">#ff4a1c</span></div></div>
  <div><div class="sw" style="background:var(--signal-600)"></div><div class="meta"><b>600</b><span class="hex">#e23a0e</span></div></div>
  <div><div class="sw" style="background:var(--signal-700)"></div><div class="meta"><b>700</b><span class="hex">#b82c08</span></div></div>
</div>
</body></html>
