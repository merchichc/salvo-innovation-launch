<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px 22px; background:var(--paper); font-family:var(--font-mono); }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .tile { position:relative; height:172px; border-radius:14px; border:2px solid var(--ink-900); background:var(--white); box-shadow:var(--shadow-hard); overflow:hidden; display:flex; align-items:flex-end; }
  .tile img { position:absolute; }
  .cap { position:relative; z-index:2; margin:10px; font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-900); }
  .cap b { color:var(--signal-600); }
</style></head>
<body>
<div class="row">
  <div class="tile"><img src="../assets/brand-flags-salvo.svg" style="left:14px; right:14px; top:56px; width:calc(100% - 28px)" alt="" /><span class="cap"><b>Flags</b> — spells SALVO · Home</span></div>
  <div class="tile"><img src="../assets/brand-stickies.svg" style="right:-20px; top:-6px; width:300px" alt="" /><span class="cap"><b>Stickies</b> — workshops · Services</span></div>
</div>
</body></html>
