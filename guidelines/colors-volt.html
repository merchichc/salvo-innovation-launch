<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--paper); font-family:var(--font-mono); }
  .row { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
  .sw { border-radius:var(--radius-md); border:2px solid var(--ink-900); height:78px; }
  .meta { margin-top:8px; font-size:11px; line-height:1.3; }
  .meta b { display:block; font-weight:700; }
  .hex { color:var(--text-muted); text-transform:uppercase; }
  .star { font-size:10px; color:var(--volt-700); font-weight:700; }
</style></head>
<body>
<div class="row">
  <div><div class="sw" style="background:var(--volt-100)"></div><div class="meta"><b>100</b><span class="hex">#f3ffc8</span></div></div>
  <div><div class="sw" style="background:var(--volt-200)"></div><div class="meta"><b>200</b><span class="hex">#eeffb6</span></div></div>
  <div><div class="sw" style="background:var(--volt-400)"></div><div class="meta"><b>400</b><span class="hex">#e1ff77</span></div></div>
  <div><div class="sw" style="background:var(--volt-500)"></div><div class="meta"><b>500 <span class="star">SECONDARY</span></b><span class="hex">#d4ff47</span></div></div>
  <div><div class="sw" style="background:var(--volt-600)"></div><div class="meta"><b>600</b><span class="hex">#aed11d</span></div></div>
  <div><div class="sw" style="background:var(--volt-700)"></div><div class="meta"><b>700</b><span class="hex">#8aab10</span></div></div>
</div>
</body></html>
