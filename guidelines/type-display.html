<!-- @dsCard group="Type" viewport="700x150" name="Display — Space Grotesk" subtitle="700. Headlines, big statements. Tight tracking." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px 24px; background:var(--paper); }
  .big { font-family:var(--font-display); font-weight:700; font-size:62px; line-height:0.98; letter-spacing:-0.03em; color:var(--ink-900); margin:0; }
  .big em { font-style:normal; color:var(--signal-500); }
  .tag { font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-top:14px; }
</style></head>
<body>
<p class="big">Your product is stuck.<br><em>We bring the fire.</em></p>
<div class="tag">Space Grotesk · 700 · −0.03em tracking</div>
</body></html>
