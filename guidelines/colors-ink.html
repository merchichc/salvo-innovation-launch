<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--paper); font-family:var(--font-mono); }
  .row { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
  .sw { border-radius:var(--radius-md); border:2px solid var(--ink-900); height:78px; }
  .meta { margin-top:8px; font-size:11px; line-height:1.3; }
  .meta b { display:block; font-weight:700; }
  .hex { color:var(--text-muted); text-transform:uppercase; }
</style></head>
<body>
<div class="row">
  <div><div class="sw" style="background:var(--ink-500)"></div><div class="meta"><b>500</b><span class="hex">#436f93</span></div></div>
  <div><div class="sw" style="background:var(--ink-600)"></div><div class="meta"><b>600</b><span class="hex">#2e5475</span></div></div>
  <div><div class="sw" style="background:var(--ink-700)"></div><div class="meta"><b>700</b><span class="hex">#1c3d58</span></div></div>
  <div><div class="sw" style="background:var(--ink-800)"></div><div class="meta"><b>800</b><span class="hex">#102a40</span></div></div>
  <div><div class="sw" style="background:var(--ink-900)"></div><div class="meta"><b>900 ★</b><span class="hex">#0a1a2b</span></div></div>
  <div><div class="sw" style="background:var(--ink-950)"></div><div class="meta"><b>950</b><span class="hex">#06121e</span></div></div>
</div>
</body></html>
