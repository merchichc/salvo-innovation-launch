<!-- @dsCard group="Effects" viewport="700x180" name="Hard offset shadow — signature" subtitle="Solid, blur-less ink. Sticker energy. Hover grows, press collapses." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:26px 24px; background:var(--paper); font-family:var(--font-mono); }
  .row { display:flex; gap:34px; align-items:center; }
  .box { width:120px; height:84px; border-radius:var(--radius-md); border:2px solid var(--ink-900); background:var(--white); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--ink-900); }
  .v { font-size:10px; color:var(--text-muted); margin-top:10px; text-align:center; }
  .item{ text-align:center; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-hard)">ink</div><div class="v">--shadow-hard · 4 4 0</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-hard-lg)">ink lg</div><div class="v">--shadow-hard-lg · 7 7 0</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-hard-signal)">signal</div><div class="v">--shadow-hard-signal</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-hard-volt)">volt</div><div class="v">--shadow-hard-volt</div></div>
</div>
</body></html>
