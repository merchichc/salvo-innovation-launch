<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:30px 24px; background:var(--paper); font-family:var(--font-mono); }
  .row { display:flex; gap:40px; align-items:center; }
  .box { width:130px; height:84px; border-radius:var(--radius-lg); background:var(--white); border:1px solid var(--border-subtle); }
  .v { font-size:10px; color:var(--text-muted); margin-top:12px; text-align:center; }
  .item{ text-align:center; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="v">--shadow-sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="v">--shadow-md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="v">--shadow-lg</div></div>
</div>
</body></html>
