<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing scale" subtitle="4px base grid. --space-1 … --space-12." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px 24px; background:var(--paper); font-family:var(--font-mono); }
  .row { display:flex; align-items:center; gap:12px; padding:3px 0; }
  .bar { background:var(--signal-500); height:14px; border-radius:3px; }
  .name { width:90px; font-size:11px; color:var(--ink-900); font-weight:700; }
  .val { font-size:11px; color:var(--text-muted); }
</style></head>
<body>
  <div class="row"><span class="name">space-1</span><span class="bar" style="width:4px"></span><span class="val">4px</span></div>
  <div class="row"><span class="name">space-2</span><span class="bar" style="width:8px"></span><span class="val">8px</span></div>
  <div class="row"><span class="name">space-3</span><span class="bar" style="width:12px"></span><span class="val">12px</span></div>
  <div class="row"><span class="name">space-4</span><span class="bar" style="width:16px"></span><span class="val">16px</span></div>
  <div class="row"><span class="name">space-5</span><span class="bar" style="width:24px"></span><span class="val">24px</span></div>
  <div class="row"><span class="name">space-6</span><span class="bar" style="width:32px"></span><span class="val">32px</span></div>
  <div class="row"><span class="name">space-7</span><span class="bar" style="width:40px"></span><span class="val">40px</span></div>
  <div class="row"><span class="name">space-8</span><span class="bar" style="width:48px"></span><span class="val">48px</span></div>
  <div class="row"><span class="name">space-9</span><span class="bar" style="width:64px"></span><span class="val">64px</span></div>
  <div class="row"><span class="name">space-10</span><span class="bar" style="width:80px"></span><span class="val">80px</span></div>
</body></html>
