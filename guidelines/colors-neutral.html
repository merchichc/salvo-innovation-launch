<!-- @dsCard group="Colors" viewport="700x150" name="Paper & warm neutrals" subtitle="Canvas + warm-tinted borders, muted text, sunken surfaces." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--white); font-family:var(--font-mono); }
  .row { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; }
  .sw { border-radius:var(--radius-md); border:2px solid var(--ink-900); height:78px; }
  .meta { margin-top:8px; font-size:11px; line-height:1.3; }
  .meta b { display:block; font-weight:700; }
  .hex { color:var(--text-muted); text-transform:uppercase; }
</style></head>
<body>
<div class="row">
  <div><div class="sw" style="background:var(--white)"></div><div class="meta"><b>white</b><span class="hex">#ffffff</span></div></div>
  <div><div class="sw" style="background:var(--paper)"></div><div class="meta"><b>paper ★</b><span class="hex">#f6f1e7</span></div></div>
  <div><div class="sw" style="background:var(--paper-dim)"></div><div class="meta"><b>dim</b><span class="hex">#ece5d6</span></div></div>
  <div><div class="sw" style="background:var(--sand-200)"></div><div class="meta"><b>sand 200</b><span class="hex">#ded7c7</span></div></div>
  <div><div class="sw" style="background:var(--sand-300)"></div><div class="meta"><b>sand 300</b><span class="hex">#c5bda9</span></div></div>
  <div><div class="sw" style="background:var(--sand-400)"></div><div class="meta"><b>sand 400</b><span class="hex">#9a917c</span></div></div>
  <div><div class="sw" style="background:var(--sand-500)"></div><div class="meta"><b>sand 500</b><span class="hex">#6f6a5b</span></div></div>
</div>
</body></html>
