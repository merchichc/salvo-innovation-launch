<!-- @dsCard group="Effects" viewport="700x150" name="Corner radius" subtitle="xs 4 · sm 8 · md 12 · lg 18 · xl 26 · pill" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px 24px; background:var(--paper); font-family:var(--font-mono); }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:70px; height:70px; background:var(--white); border:2px solid var(--ink-900); }
  .lbl { margin-top:8px; font-size:11px; font-weight:700; color:var(--ink-900); }
  .v { font-size:10px; color:var(--text-muted); }
  .pill { width:110px; border-radius:999px; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lbl">xs</div><div class="v">4px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm</div><div class="v">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md</div><div class="v">12px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg</div><div class="v">18px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl</div><div class="v">26px</div></div>
  <div class="item"><div class="box pill" style="border-radius:var(--radius-pill)"></div><div class="lbl">pill</div><div class="v">buttons</div></div>
</div>
</body></html>
