<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px 24px; background:var(--paper); font-family:var(--font-mono); }
  .eye { display:flex; align-items:center; gap:10px; font-size:13px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--signal-600); margin-bottom:16px; }
  .eye::before { content:""; width:26px; height:0; border-top:2px solid currentColor; }
  .labels { display:flex; gap:14px; flex-wrap:wrap; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-800); font-weight:700; }
  .labels span { border:1.5px solid var(--ink-900); border-radius:999px; padding:5px 11px; }
  .tag { font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-top:16px; }
</style></head>
<body>
<div class="eye">The Salvo Method</div>
<div class="labels"><span>What we do</span><span>02 — Facilitation</span><span>Product sprint</span><span>Booked</span></div>
<div class="tag">Space Mono · 700 · +0.16em · uppercase</div>
</body></html>
